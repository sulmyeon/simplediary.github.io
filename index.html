<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心语日记 - 记录生活的美好</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --secondary-gradient: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --warm-gradient: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            --nature-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            --dark-bg: #1a1a2e;
            --card-bg: rgba(255, 255, 255, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --text-primary: #2d3748;
            --text-secondary: #718096;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.3);
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --bg-color: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --input-bg: #f7fafc;
            --border-color: rgba(0, 0, 0, 0.05);
        }

        /* 暗色主题 */
        [data-theme="dark"] {
            --card-bg: rgba(30, 30, 50, 0.95);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #e2e8f0;
            --text-secondary: #a0aec0;
            --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.3);
            --bg-color: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --input-bg: #2d3748;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        [data-theme="dark"] body {
            background: var(--bg-color);
        }

        [data-theme="dark"] .bg-animation::before {
            background: 
                radial-gradient(circle at 20% 80%, rgba(102, 126, 234, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(240, 147, 251, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.02) 0%, transparent 30%);
        }

        [data-theme="dark"] .search-box,
        [data-theme="dark"] .diary-item,
        [data-theme="dark"] .mood-btn,
        [data-theme="dark"] .filter-select,
        [data-theme="dark"] .quick-tag,
        [data-theme="dark"] .calendar-nav button,
        [data-theme="dark"] .modal-close,
        [data-theme="dark"] .toolbar-btn.secondary,
        [data-theme="dark"] .clear-filter-btn {
            background: var(--input-bg);
            color: var(--text-secondary);
        }

        [data-theme="dark"] .diary-item-preview,
        [data-theme="dark"] .diary-item-date,
        [data-theme="dark"] .editor-content::placeholder,
        [data-theme="dark"] .editor-title::placeholder {
            color: #718096;
        }

        [data-theme="dark"] .mood-btn {
            border-color: var(--border-color);
        }

        [data-theme="dark"] .mood-btn:hover {
            border-color: #667eea;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-color);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            transition: var(--transition-smooth);
        }

        /* 背景动画 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            top: -25%;
            left: -25%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.05) 0%, transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* 主容器 */
        .app-container {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
        }

        /* 头部 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--card-bg);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: var(--shadow-soft);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text {
            color: white;
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .logo-text p {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .btn-icon {
            width: 45px;
            height: 45px;
            border: none;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            cursor: pointer;
            font-size: 20px;
            transition: var(--transition-smooth);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-icon:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* 主布局 */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 25px;
            height: calc(100vh - 140px);
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .nav-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .nav-card h3 {
            font-size: 14px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition-smooth);
            margin-bottom: 8px;
        }

        .nav-item:hover, .nav-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
            color: #667eea;
        }

        .nav-item.active {
            font-weight: 500;
        }

        .nav-item .icon {
            font-size: 20px;
            width: 30px;
            text-align: center;
        }

        .nav-item .badge {
            margin-left: auto;
            background: var(--secondary-gradient);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        /* 统计卡片 */
        .stats-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item:last-child {
            margin-bottom: 0;
        }

        .stat-icon {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .stat-icon.purple { background: linear-gradient(135deg, #667eea20, #764ba220); }
        .stat-icon.pink { background: linear-gradient(135deg, #f093fb20, #f5576c20); }
        .stat-icon.orange { background: linear-gradient(135deg, #fa709a20, #fee14020); }

        .stat-info h4 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        /* 主内容区 */
        .main-content {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-header {
            padding: 25px 30px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .content-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: #f7fafc;
            border-radius: 12px;
            padding: 10px 15px;
            gap: 10px;
            width: 280px;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .search-box input::placeholder {
            color: #a0aec0;
        }

        /* 编辑器 */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 30px;
            overflow-y: auto;
        }

        .editor-header {
            margin-bottom: 25px;
        }

        .date-display {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .date-day {
            font-size: 48px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .date-info {
            display: flex;
            flex-direction: column;
        }

        .date-month {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-weekday {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .mood-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mood-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .mood-btn:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .mood-btn.active {
            background: var(--primary-gradient);
            border-color: transparent;
            color: white;
        }

        .editor-title {
            font-size: 28px;
            font-weight: 600;
            border: none;
            outline: none;
            width: 100%;
            margin-bottom: 20px;
            background: transparent;
            color: var(--text-primary);
        }

        .editor-title::placeholder {
            color: #cbd5e0;
        }

        .editor-content {
            flex: 1;
            font-size: 16px;
            line-height: 1.8;
            border: none;
            outline: none;
            resize: none;
            background: transparent;
            color: var(--text-primary);
            font-family: inherit;
        }

        .editor-content::placeholder {
            color: #cbd5e0;
        }

        .editor-toolbar {
            display: flex;
            gap: 10px;
            padding: 15px 0;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .editor-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 13px;
            color: var(--text-secondary);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .editor-stats strong {
            color: #667eea;
            font-weight: 600;
        }

        #autoSaveStatus {
            font-style: italic;
            color: #48bb78;
        }

        .toolbar-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn.primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .toolbar-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.5);
        }

        .toolbar-btn.secondary {
            background: #f7fafc;
            color: var(--text-secondary);
        }

        .toolbar-btn.secondary:hover {
            background: #edf2f7;
        }

        /* 日记列表 */
        .diary-list {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
        }

        .diary-list.active {
            display: block;
        }

        .diary-item {
            background: #f7fafc;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
            position: relative;
        }

        .diary-item:hover {
            transform: translateX(5px);
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
        }

        .diary-item-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .diary-item-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
            cursor: pointer;
        }

        .diary-item-date {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .diary-item-mood {
            font-size: 24px;
        }

        .diary-item-preview {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            cursor: pointer;
        }

        .diary-item-tags {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 5px 12px;
            background: white;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .tag:hover {
            background: var(--primary-gradient);
            color: white;
        }

        .diary-item-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .action-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-smooth);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn.edit {
            background: linear-gradient(135deg, #667eea20, #764ba220);
            color: #667eea;
        }

        .action-btn.edit:hover {
            background: var(--primary-gradient);
            color: white;
        }

        .action-btn.delete {
            background: linear-gradient(135deg, #ff6b6b20, #ee5a6f20);
            color: #ff6b6b;
        }

        .action-btn.delete:hover {
            background: linear-gradient(135deg, #ff6b6b, #ee5a6f);
            color: white;
        }

        .action-btn.view {
            background: linear-gradient(135deg, #4ecdc420, #44a08d20);
            color: #44a08d;
        }

        .action-btn.view:hover {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        /* 筛选器 */
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .filter-group label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .filter-select {
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            outline: none;
            transition: var(--transition-smooth);
        }

        .filter-select:hover, .filter-select:focus {
            border-color: #667eea;
        }

        .filter-btn {
            padding: 8px 16px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .clear-filter-btn {
            padding: 8px 16px;
            background: #f7fafc;
            color: var(--text-secondary);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .clear-filter-btn:hover {
            background: #edf2f7;
        }

        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: var(--shadow-soft);
            animation: slideUp 0.3s ease;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .modal-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-date {
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: #f7fafc;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            transition: var(--transition-smooth);
        }

        .modal-close:hover {
            background: #edf2f7;
            transform: rotate(90deg);
        }

        .modal-body {
            font-size: 16px;
            line-height: 1.8;
            color: var(--text-primary);
            white-space: pre-wrap;
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* 右侧面板 */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 日历 */
        .calendar-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .calendar-nav {
            display: flex;
            gap: 5px;
        }

        .calendar-nav button {
            width: 28px;
            height: 28px;
            border: none;
            background: #f7fafc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition-smooth);
        }

        .calendar-nav button:hover {
            background: #667eea;
            color: white;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .calendar-weekday {
            font-size: 12px;
            color: var(--text-secondary);
            padding: 10px 0;
            font-weight: 500;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-smooth);
            position: relative;
        }

        .calendar-day:hover {
            background: #f7fafc;
        }

        .calendar-day.today {
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
        }

        .calendar-day.has-entry::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            background: #f5576c;
            border-radius: 50%;
        }

        .calendar-day.other-month {
            color: #cbd5e0;
        }

        /* 心情分布 */
        .mood-chart-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .mood-chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .mood-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .mood-bar-icon {
            font-size: 20px;
            width: 30px;
        }

        .mood-bar-track {
            flex: 1;
            height: 8px;
            background: #f7fafc;
            border-radius: 4px;
            overflow: hidden;
        }

        .mood-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .mood-bar-count {
            font-size: 13px;
            color: var(--text-secondary);
            width: 25px;
            text-align: right;
        }

        /* 快速标签 */
        .quick-tags-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-soft);
        }

        .quick-tags-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .quick-tag {
            padding: 8px 16px;
            background: #f7fafc;
            border: none;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition-smooth);
            color: var(--text-secondary);
        }

        .quick-tag:hover {
            background: var(--primary-gradient);
            color: white;
            transform: translateY(-2px);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        /* 响应式 */
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 260px 1fr;
            }
            .right-panel {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 10px;
                padding-bottom: 80px;
            }

            .main-layout {
                grid-template-columns: 1fr;
                height: auto;
                gap: 15px;
            }

            .sidebar {
                display: none;
            }

            .header {
                flex-direction: row;
                padding: 10px 0;
                margin-bottom: 15px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                font-size: 22px;
            }

            .logo-text h1 {
                font-size: 20px;
            }

            .logo-text p {
                display: none;
            }

            .header-actions {
                gap: 10px;
            }

            .btn-icon {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .main-content {
                border-radius: 16px;
            }

            .content-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 12px;
            }

            .content-header h2 {
                font-size: 18px;
            }

            .search-box {
                width: 100%;
            }

            .editor-container {
                padding: 20px;
            }

            .date-day {
                font-size: 36px;
            }

            .mood-selector {
                gap: 8px;
            }

            .mood-btn {
                padding: 6px 12px;
                font-size: 13px;
            }

            .editor-title {
                font-size: 22px;
            }

            .editor-toolbar {
                flex-wrap: wrap;
                gap: 8px;
            }

            .toolbar-btn {
                padding: 8px 14px;
                font-size: 13px;
                flex: 1;
                min-width: 70px;
                justify-content: center;
            }

            .diary-list {
                padding: 15px;
            }

            .filter-bar {
                flex-direction: column;
                gap: 10px;
                align-items: stretch;
            }

            .filter-group {
                justify-content: space-between;
            }

            .filter-select {
                flex: 1;
                max-width: 150px;
            }

            .diary-item {
                padding: 18px;
            }

            .diary-item-title {
                font-size: 16px;
            }

            .diary-item-actions {
                flex-wrap: wrap;
                gap: 8px;
            }

            .action-btn {
                padding: 6px 12px;
                font-size: 12px;
                flex: 1;
                justify-content: center;
            }

            /* 手机底部导航 */
            .mobile-nav {
                display: flex;
                position: fixed;
                bottom: 0;
                left: 0;
                right: 0;
                background: var(--card-bg);
                box-shadow: 0 -5px 20px rgba(0, 0, 0, 0.1);
                z-index: 100;
                padding: 8px 0;
                backdrop-filter: blur(10px);
            }

            .mobile-nav-item {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 4px;
                padding: 8px;
                cursor: pointer;
                transition: var(--transition-smooth);
                border: none;
                background: none;
                color: var(--text-secondary);
                font-size: 12px;
            }

            .mobile-nav-item.active {
                color: #667eea;
            }

            .mobile-nav-item .icon {
                font-size: 22px;
            }

            .mobile-nav-item .badge {
                position: absolute;
                top: 5px;
                right: 20%;
                background: var(--secondary-gradient);
                color: white;
                padding: 2px 6px;
                border-radius: 10px;
                font-size: 10px;
                font-weight: 600;
            }

            .modal-content {
                margin: 20px;
                max-height: 85vh;
                padding: 20px;
            }

            .modal-title {
                font-size: 20px;
            }

            .modal-footer {
                flex-wrap: wrap;
            }
        }

        /* 桌面端隐藏手机导航 */
        .mobile-nav {
            display: none;
        }

        @media (max-width: 768px) {
            .mobile-nav {
                display: flex;
            }
        }

        /* 动画类 */
        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.5);
        }
    </style>
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation"></div>
    <div class="particles" id="particles"></div>

    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon">📔</div>
                <div class="logo-text">
                    <h1>心语日记</h1>
                    <p>记录生活的美好瞬间</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="btn-icon" onclick="exportData()" title="导出数据">📥</button>
                <button class="btn-icon" onclick="toggleTheme()" title="切换主题">🌙</button>
                <button class="btn-icon" onclick="showSettings()" title="设置">⚙️</button>
            </div>
        </header>

        <!-- 主布局 -->
        <div class="main-layout">
            <!-- 左侧导航 -->
            <aside class="sidebar">
                <div class="nav-card">
                    <h3>菜单</h3>
                    <div class="nav-item active" onclick="switchView('write')">
                        <span class="icon">✍️</span>
                        <span>写日记</span>
                    </div>
                    <div class="nav-item" onclick="switchView('list')">
                        <span class="icon">📚</span>
                        <span>日记列表</span>
                        <span class="badge" id="diaryCount">0</span>
                    </div>
                </div>

                <div class="stats-card">
                    <div class="stat-item">
                        <div class="stat-icon purple">📖</div>
                        <div class="stat-info">
                            <h4 id="totalEntries">0</h4>
                            <p>篇日记</p>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon pink">🔥</div>
                        <div class="stat-info">
                            <h4 id="currentStreak">0</h4>
                            <p>天连续记录</p>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon orange">💭</div>
                        <div class="stat-info">
                            <h4 id="totalWords">0</h4>
                            <p>总字数</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- 主内容区 -->
            <main class="main-content">
                <div class="content-header">
                    <h2 id="pageTitle">写日记</h2>
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" placeholder="搜索日记..." id="searchInput" oninput="searchDiaries()">
                    </div>
                </div>

                <!-- 编辑器视图 -->
                <div class="editor-container" id="editorView">
                    <div class="editor-header">
                        <div class="date-display">
                            <div class="date-day" id="currentDay">1</div>
                            <div class="date-info">
                                <div class="date-month" id="currentMonth">一月</div>
                                <div class="date-weekday" id="currentWeekday">星期一</div>
                            </div>
                        </div>
                        <div class="mood-selector">
                            <button class="mood-btn" data-mood="happy" onclick="selectMood('happy')">😊 开心</button>
                            <button class="mood-btn" data-mood="calm" onclick="selectMood('calm')">😌 平静</button>
                            <button class="mood-btn" data-mood="excited" onclick="selectMood('excited')">🤩 兴奋</button>
                            <button class="mood-btn" data-mood="sad" onclick="selectMood('sad')">😢 难过</button>
                            <button class="mood-btn" data-mood="angry" onclick="selectMood('angry')">😠 生气</button>
                            <button class="mood-btn" data-mood="tired" onclick="selectMood('tired')">😴 疲惫</button>
                            <button class="mood-btn" data-mood="grateful" onclick="selectMood('grateful')">🙏 感恩</button>
                            <button class="mood-btn" data-mood="loved" onclick="selectMood('loved')">🥰 幸福</button>
                        </div>
                    </div>
                    <input type="text" class="editor-title" placeholder="今天发生了什么有趣的事？" id="diaryTitle">
                    <textarea class="editor-content" placeholder="写下你的想法和感受...&#10;&#10;可以记录：&#10;• 今天发生了什么？&#10;• 你的心情如何？&#10;• 有什么值得感恩的事？&#10;• 明天的计划是什么？" id="diaryContent" oninput="updateWordCount()"></textarea>
                    <div class="editor-stats" id="editorStats">
                        <span>💬 字数: <strong id="wordCount">0</strong></span>
                        <span id="autoSaveStatus"></span>
                    </div>
                    <div class="editor-toolbar">
                        <button class="toolbar-btn primary" onclick="saveDiary()">
                            <span>💾</span> 保存日记
                        </button>
                        <button class="toolbar-btn secondary" onclick="clearEditor()">
                            <span>🔄</span> 清空
                        </button>
                        <button class="toolbar-btn secondary" onclick="addTag()">
                            <span>🏷️</span> 添加标签
                        </button>
                        <button class="toolbar-btn secondary" onclick="insertTemplate()">
                            <span>📝</span> 模板
                        </button>
                    </div>
                </div>

                <!-- 日记列表视图 -->
                <div class="diary-list" id="listView">
                    <!-- 筛选器 -->
                    <div class="filter-bar">
                        <div class="filter-group">
                            <label>心情：</label>
                            <select class="filter-select" id="filterMood" onchange="applyFilters()">
                                <option value="">全部</option>
                                <option value="happy">😊 开心</option>
                                <option value="calm">😌 平静</option>
                                <option value="excited">🤩 兴奋</option>
                                <option value="sad">😢 难过</option>
                                <option value="angry">😠 生气</option>
                                <option value="tired">😴 疲惫</option>
                                <option value="grateful">🙏 感恩</option>
                                <option value="loved">🥰 幸福</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>标签：</label>
                            <select class="filter-select" id="filterTag" onchange="applyFilters()">
                                <option value="">全部</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>时间：</label>
                            <select class="filter-select" id="filterTime" onchange="applyFilters()">
                                <option value="">全部</option>
                                <option value="today">今天</option>
                                <option value="week">本周</option>
                                <option value="month">本月</option>
                                <option value="year">今年</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>排序：</label>
                            <select class="filter-select" id="sortOrder" onchange="applyFilters()">
                                <option value="newest">最新优先</option>
                                <option value="oldest">最早优先</option>
                            </select>
                        </div>
                        <button class="clear-filter-btn" onclick="clearFilters()">清除筛选</button>
                    </div>
                    <div id="diaryListContainer"></div>
                </div>
            </main>

            <!-- 右侧面板 -->
            <aside class="right-panel">
                <div class="calendar-card">
                    <div class="calendar-header">
                        <h3 id="calendarMonth">2024年1月</h3>
                        <div class="calendar-nav">
                            <button onclick="changeMonth(-1)">‹</button>
                            <button onclick="changeMonth(1)">›</button>
                        </div>
                    </div>
                    <div class="calendar-grid" id="calendarGrid">
                        <!-- 日历内容由JS生成 -->
                    </div>
                </div>

                <div class="mood-chart-card">
                    <h3>心情分布</h3>
                    <div id="moodChart">
                        <div class="mood-bar">
                            <span class="mood-bar-icon">😊</span>
                            <div class="mood-bar-track">
                                <div class="mood-bar-fill" style="width: 0%; background: linear-gradient(90deg, #f093fb, #f5576c);"></div>
                            </div>
                            <span class="mood-bar-count">0</span>
                        </div>
                        <div class="mood-bar">
                            <span class="mood-bar-icon">😌</span>
                            <div class="mood-bar-track">
                                <div class="mood-bar-fill" style="width: 0%; background: linear-gradient(90deg, #667eea, #764ba2);"></div>
                            </div>
                            <span class="mood-bar-count">0</span>
                        </div>
                        <div class="mood-bar">
                            <span class="mood-bar-icon">🤩</span>
                            <div class="mood-bar-track">
                                <div class="mood-bar-fill" style="width: 0%; background: linear-gradient(90deg, #fa709a, #fee140);"></div>
                            </div>
                            <span class="mood-bar-count">0</span>
                        </div>
                        <div class="mood-bar">
                            <span class="mood-bar-icon">🥰</span>
                            <div class="mood-bar-track">
                                <div class="mood-bar-fill" style="width: 0%; background: linear-gradient(90deg, #a8edea, #fed6e3);"></div>
                            </div>
                            <span class="mood-bar-count">0</span>
                        </div>
                    </div>
                </div>

                <div class="quick-tags-card">
                    <h3>快速标签</h3>
                    <div class="quick-tags">
                        <button class="quick-tag" onclick="quickAddTag('工作')">💼 工作</button>
                        <button class="quick-tag" onclick="quickAddTag('学习')">📚 学习</button>
                        <button class="quick-tag" onclick="quickAddTag('旅行')">✈️ 旅行</button>
                        <button class="quick-tag" onclick="quickAddTag('美食')">🍜 美食</button>
                        <button class="quick-tag" onclick="quickAddTag('运动')">🏃 运动</button>
                        <button class="quick-tag" onclick="quickAddTag('阅读')">📖 阅读</button>
                        <button class="quick-tag" onclick="quickAddTag('电影')">🎬 电影</button>
                        <button class="quick-tag" onclick="quickAddTag('音乐')">🎵 音乐</button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 手机底部导航 -->
    <nav class="mobile-nav" id="mobileNav">
        <button class="mobile-nav-item active" onclick="switchView('write')" data-view="write">
            <span class="icon">✍️</span>
            <span>写日记</span>
        </button>
        <button class="mobile-nav-item" onclick="switchView('list')" data-view="list">
            <span class="icon">📚</span>
            <span>日记</span>
            <span class="badge" id="mobileDiaryCount">0</span>
        </button>
        <button class="mobile-nav-item" onclick="showMobileCalendar()">
            <span class="icon">📅</span>
            <span>日历</span>
        </button>
        <button class="mobile-nav-item" onclick="showMobileStats()">
            <span class="icon">📊</span>
            <span>统计</span>
        </button>
    </nav>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="detailModal" onclick="closeModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="modalTitle"></div>
                    <div class="modal-date" id="modalDate"></div>
                </div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="diary-item-tags" id="modalTags"></div>
            <div class="modal-footer">
                <button class="action-btn edit" onclick="editFromModal()">
                    <span>✏️</span> 编辑
                </button>
                <button class="action-btn delete" onclick="deleteFromModal()">
                    <span>🗑️</span> 删除
                </button>
            </div>
        </div>
    </div>

    <script>
        // 数据存储
        let diaries = JSON.parse(localStorage.getItem('diaries')) || [];
        let currentMood = '';
        let currentTags = [];
        let currentDate = new Date();
        let calendarDate = new Date();
        let editingId = null;

        // 心情映射
        const moodMap = {
            happy: { icon: '😊', name: '开心', color: 'linear-gradient(90deg, #f093fb, #f5576c)' },
            calm: { icon: '😌', name: '平静', color: 'linear-gradient(90deg, #667eea, #764ba2)' },
            excited: { icon: '🤩', name: '兴奋', color: 'linear-gradient(90deg, #fa709a, #fee140)' },
            sad: { icon: '😢', name: '难过', color: 'linear-gradient(90deg, #a8edea, #fed6e3)' },
            angry: { icon: '😠', name: '生气', color: 'linear-gradient(90deg, #ff6b6b, #ee5a6f)' },
            tired: { icon: '😴', name: '疲惫', color: 'linear-gradient(90deg, #74b9ff, #0984e3)' },
            grateful: { icon: '🙏', name: '感恩', color: 'linear-gradient(90deg, #fdcb6e, #e17055)' },
            loved: { icon: '🥰', name: '幸福', color: 'linear-gradient(90deg, #fd79a8, #e84393)' }
        };

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            initTheme();
            initParticles();
            updateDateDisplay();
            renderCalendar();
            updateStats();
            updateMoodChart();
            updateTagFilter();
            renderDiaryList();
            restoreDraft();
        });

        // 主题管理
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
            
            showNotification(newTheme === 'dark' ? '已切换到暗色模式' : '已切换到亮色模式', 'success');
        }

        function updateThemeIcon(theme) {
            const themeBtn = document.querySelector('[onclick="toggleTheme()"]');
            if (themeBtn) {
                themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
                themeBtn.title = theme === 'dark' ? '切换到亮色模式' : '切换到暗色模式';
            }
        }

        // 手机端功能
        function showMobileCalendar() {
            const today = new Date();
            const dateStr = `${today.getFullYear()}年${today.getMonth() + 1}月`;
            const daysInMonth = new Date(today.getFullYear(), today.getMonth() + 1, 0).getDate();
            
            let calendarHtml = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; margin-top: 15px;">';
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            weekdays.forEach(d => {
                calendarHtml += `<div style="font-size: 12px; color: var(--text-secondary); padding: 8px 0;">${d}</div>`;
            });
            
            const firstDay = new Date(today.getFullYear(), today.getMonth(), 1).getDay();
            for (let i = 0; i < firstDay; i++) {
                calendarHtml += '<div></div>';
            }
            
            for (let day = 1; day <= daysInMonth; day++) {
                const dateCheck = new Date(today.getFullYear(), today.getMonth(), day);
                const hasEntry = diaries.some(d => new Date(d.date).toDateString() === dateCheck.toDateString());
                const isToday = day === today.getDate();
                
                calendarHtml += `
                    <div style="
                        aspect-ratio: 1; 
                        display: flex; 
                        align-items: center; 
                        justify-content: center; 
                        border-radius: 8px; 
                        font-size: 14px;
                        background: ${isToday ? 'var(--primary-gradient)' : 'var(--input-bg)'};
                        color: ${isToday ? 'white' : 'var(--text-primary)'};
                        position: relative;
                    " onclick="selectDate(${today.getFullYear()}, ${today.getMonth()}, ${day}); closeModal();">
                        ${day}
                        ${hasEntry ? '<span style="position: absolute; bottom: 3px; width: 4px; height: 4px; background: #f5576c; border-radius: 50%;"></span>' : ''}
                    </div>
                `;
            }
            calendarHtml += '</div>';
            
            document.getElementById('modalTitle').textContent = '📅 ' + dateStr;
            document.getElementById('modalDate').textContent = '点击日期写日记';
            document.getElementById('modalBody').innerHTML = calendarHtml;
            document.getElementById('modalTags').innerHTML = '';
            document.querySelector('.modal-footer').innerHTML = `
                <button class="action-btn" onclick="closeModal()" style="flex: 1; background: var(--input-bg); color: var(--text-secondary);">
                    关闭
                </button>

            if (autoSaveTimer) clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                autoSaveDraft();
            }, 3000);
        }

        function autoSaveDraft() {
            const title = document.getElementById('diaryTitle').value;
            const content = document.getElementById('diaryContent').value;
            
            if (title || content) {
                const draft = {
                    title,
                    content,
                    mood: currentMood,
                    tags: currentTags,
                    date: currentDate.toISOString(),
                    editingId: editingId,
                    savedAt: new Date().toISOString()
                };
                localStorage.setItem('diaryDraft', JSON.stringify(draft));
                document.getElementById('autoSaveStatus').textContent = '✓ 已自动保存';
                setTimeout(() => {
                    document.getElementById('autoSaveStatus').textContent = '';
                }, 2000);

        // 恢复草稿
        function restoreDraft() {
            const draft = JSON.parse(localStorage.getItem('diaryDraft'));
            if (draft && !editingId) {
                const savedTime = new Date(draft.savedAt);
                const now = new Date();
                const hoursDiff = (now - savedTime) / (1000 * 60 * 60);
                
                // 只恢复24小时内的草稿
                if (hoursDiff < 24) {
                    if (confirm('检测到有未保存的草稿，是否恢复？')) {
                        document.getElementById('diaryTitle').value = draft.title || '';
                        document.getElementById('diaryContent').value = draft.content || '';
                        currentDate = new Date(draft.date);
                        currentTags = draft.tags || [];
                        editingId = draft.editingId;
                        
                        if (draft.mood) {

                        updateDateDisplay();
                        updateWordCount();

        // 保存日记
        function saveDiary() {
            const title = document.getElementById('diaryTitle').value.trim();
            const content = document.getElementById('diaryContent').value.trim();

            if (!title && !content) {
                alert('请至少填写标题或内容');
                return;
            }

            const diary = {
                id: editingId || Date.now(),
                title: title || '无标题',
                content: content,
                mood: currentMood,
                tags: [...currentTags],
                date: currentDate.toISOString(),
                createdAt: editingId ? diaries.find(d => d.id === editingId).createdAt : new Date().toISOString()
            };

            if (editingId) {
                const index = diaries.findIndex(d => d.id === editingId);
                diaries[index] = diary;
            } else {
                diaries.unshift(diary);
            }

            localStorage.setItem('diaries', JSON.stringify(diaries));
            
            // 清除草稿
            clearDraft();

            updateMoodChart();

                // 从代码调用时，手动设置active状态
                const navItems = document.querySelectorAll('.nav-item');

                if (view === 'list' && navItems[1]) navItems[1].classList.add('active');
            }

            // 更新手机底部导航状态

                    item.classList.add('active');

        // 应用筛选
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const moodFilter = document.getElementById('filterMood').value;
            const tagFilter = document.getElementById('filterTag').value;
            const timeFilter = document.getElementById('filterTime').value;
            const sortOrder = document.getElementById('sortOrder').value;
            
            let filtered = [...diaries];
            
            // 关键词搜索
            if (searchTerm) {
                filtered = filtered.filter(d => 
                    d.title.toLowerCase().includes(searchTerm) ||
                    d.content.toLowerCase().includes(searchTerm) ||
                    d.tags.some(t => t.toLowerCase().includes(searchTerm))
                );
            }
            
            // 心情筛选
            if (moodFilter) {
                filtered = filtered.filter(d => d.mood === moodFilter);
            }
            
            // 标签筛选
            if (tagFilter) {
                filtered = filtered.filter(d => d.tags.includes(tagFilter));
            }
            
            // 时间筛选
            if (timeFilter) {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                
                filtered = filtered.filter(d => {
                    const diaryDate = new Date(d.date);
                    
                    switch(timeFilter) {
                        case 'today':
                            return diaryDate.toDateString() === today.toDateString();
                        case 'week':
                            const weekAgo = new Date(today - 7 * 24 * 60 * 60 * 1000);
                            return diaryDate >= weekAgo;
                        case 'month':
                            return diaryDate.getMonth() === today.getMonth() && 
                                   diaryDate.getFullYear() === today.getFullYear();
                        case 'year':
                            return diaryDate.getFullYear() === today.getFullYear();
                        default:
                            return true;
                    }
                });
            }
            
            // 排序
            filtered.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
            });
            
            renderFilteredList(filtered);
        }

        // 完整日期格式化
        function formatDateFull(date) {
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const weekday = weekdays[date.getDay()];
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}年${month}月${day}日 ${weekday} ${hours}:${minutes}`;
        }

        // 渲染日历
        function renderCalendar() {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            document.getElementById('calendarMonth').textContent = `${year}年${month + 1}月`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            
            const weekdays = ['日', '一', '二', '三', '四', '五', '六'];
            let html = weekdays.map(d => `<div class="calendar-weekday">${d}</div>`).join('');
            
            // 上月日期
            for (let i = firstDay - 1; i >= 0; i--) {
                html += `<div class="calendar-day other-month">${daysInPrevMonth - i}</div>`;
            }
            
            // 当月日期
            const today = new Date();
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = new Date(year, month, day).toDateString();
                const hasEntry = diaries.some(d => new Date(d.date).toDateString() === dateStr);
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                html += `<div class="calendar-day ${isToday ? 'today' : ''} ${hasEntry ? 'has-entry' : ''}" onclick="selectDate(${year}, ${month}, ${day})">${day}</div>`;
            }
            
            // 下月日期
            const remainingCells = 42 - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            document.getElementById('calendarGrid').innerHTML = html;
        }

        // 切换月份
        function changeMonth(delta) {
            calendarDate.setMonth(calendarDate.getMonth() + delta);
            renderCalendar();
        }

        // 选择日期
        function selectDate(year, month, day) {
            currentDate = new Date(year, month, day);
            updateDateDisplay();
            switchView('write');
        }

        // 更新统计
        function updateStats() {
            document.getElementById('diaryCount').textContent = diaries.length;
            document.getElementById('totalEntries').textContent = diaries.length;
            
            // 更新手机端数量
            const mobileBadge = document.getElementById('mobileDiaryCount');
            if (mobileBadge) mobileBadge.textContent = diaries.length;
            
            // 计算连续记录天数
            const streak = calculateStreak();
            document.getElementById('currentStreak').textContent = streak;
            
            // 计算总字数
            const totalWords = diaries.reduce((sum, d) => sum + d.content.length, 0);
            document.getElementById('totalWords').textContent = totalWords.toLocaleString();
        }

        // 计算连续记录天数
        function calculateStreak() {
            if (diaries.length === 0) return 0;
            
            const dates = [...new Set(diaries.map(d => {
                const date = new Date(d.date);
                return new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime();
            }))].sort((a, b) => b - a);
            
            let streak = 1;
            const oneDay = 24 * 60 * 60 * 1000;
            
            for (let i = 1; i < dates.length; i++) {
                if (dates[i-1] - dates[i] === oneDay) {
                    streak++;
                } else {
                    break;
                }
            }
            
            // 检查今天是否记录
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            if (dates[0] !== today.getTime()) {
                const yesterday = new Date(today - oneDay);
                if (dates[0] !== yesterday.getTime()) {
                    streak = 0;
                }
            }
            
            return streak;
        }

        // 更新心情图表
        function updateMoodChart() {
            const moodCounts = {};
            diaries.forEach(d => {
                if (d.mood) {
                    moodCounts[d.mood] = (moodCounts[d.mood] || 0) + 1;
                }
            });
            
            const total = Object.values(moodCounts).reduce((a, b) => a + b, 0);
            const topMoods = ['happy', 'calm', 'excited', 'loved'];
            
            topMoods.forEach((mood, index) => {
                const count = moodCounts[mood] || 0;
                const percentage = total > 0 ? (count / total * 100) : 0;
                
                const bars = document.querySelectorAll('.mood-bar-fill');
                const counts = document.querySelectorAll('.mood-bar-count');
                
                if (bars[index]) {
                    bars[index].style.width = percentage + '%';
                }
                if (counts[index]) {
                    counts[index].textContent = count;
                }
            });
        }

        // 导出数据 - 统一为PDF格式
        function exportData() {
            exportToPDF();
        }

        // 导出为PDF（美观格式）
        function exportToPDF() {
            if (diaries.length === 0) {
                alert('没有日记可以导出');
                return;
            }

            // 创建打印窗口
            const printWindow = window.open('', '_blank');
            
            // 生成PDF内容
            let pdfContent = `
<!DOCTYPE html>

        .header {

        .header h1 {
            color: #667eea;

            margin-bottom: 10px;
        }
        .header p {
            color: #666;

        }
        .stats {
            display: flex;

        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;

        }
        .stat-label {

        }
        .diary-entry {
            margin-bottom: 30px;

            page-break-inside: avoid;
        }
        .diary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        .diary-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin: 0;
        }
        .diary-date {
            font-size: 13px;
            color: #888;
        }
        .diary-mood {
            font-size: 24px;
        }
        .diary-content {
            font-size: 15px;
            color: #444;
            white-space: pre-wrap;
            margin: 15px 0;
        }

            margin-top: 15px;
        }
        .tag {
            display: inline-block;

        }
        .footer {
            text-align: center;

<body>
    <div class="header">
        <h1>📔 心语日记</h1>
        <p>导出时间：${formatDateFull(new Date())}</p>

    <div class="stats">
        <div class="stat-item">
            <div class="stat-value">${diaries.length}</div>
            <div class="stat-label">篇日记</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">${calculateStreak()}</div>
            <div class="stat-label">连续天数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">${diaries.reduce((sum, d) => sum + d.content.length, 0).toLocaleString()}</div>
            <div class="stat-label">总字数</div>
        </div>
    </div>
`;

            // 按日期排序（最新的在前）
            const sortedDiaries = [...diaries].sort((a, b) => new Date(b.date) - new Date(a.date));
            
            sortedDiaries.forEach(diary => {
                const date = new Date(diary.date);
                const moodInfo = moodMap[diary.mood] || { icon: '📝', name: '未记录' };
                
                pdfContent += `
    <div class="diary-entry">

`;
            });

            pdfContent += `

                window.print();
            }, 500);
        };
    <\/script>
</body>
</html>`;

            printWindow.document.write(pdfContent);
            printWindow.document.close();
            
            showNotification('PDF导出窗口已打开，请使用浏览器的打印功能保存为PDF', 'success');
        }

        // 格式化日期用于文件名
        function formatDateForFile(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            return `${year}${month}${day}_${hours}${minutes}`;
        }



        // 显示设置
        function showSettings() {
            const confirmed = confirm('确定要清空所有日记数据吗？此操作不可恢复。');
            if (confirmed) {
                localStorage.removeItem('diaries');
                diaries = [];
                updateStats();
                updateMoodChart();
                renderCalendar();
                renderDiaryList();
                showNotification('数据已清空', 'info');
            }
        }

        // 显示通知
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                background: ${type === 'success' ? 'linear-gradient(135deg, #667eea, #764ba2)' : '#4a5568'};
                color: white;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                z-index: 10000;
                font-weight: 500;
                animation: slideIn 0.3s ease;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // 格式化日期
        function formatDate(date) {
            const now = new Date();
            const diff = now - date;
            const oneDay = 24 * 60 * 60 * 1000;
            
            if (diff < oneDay && now.getDate() === date.getDate()) {
                return '今天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else if (diff < oneDay * 2 && now.getDate() - date.getDate() === 1) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
